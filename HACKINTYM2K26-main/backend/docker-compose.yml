version: '3.9'

services:
  mongodb:
    image: mongo:7.0
    container_name: hackintym2k26-db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: hackintym2k26
    volumes:
      - mongo_data:/data/db
    networks:
      - hackintym2k26-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hackintym2k26-backend
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      MONGODB_URI: mongodb://admin:password@mongodb:27017/hackintym2k26
      NODE_ENV: development
      FRONTEND_URL: http://localhost:5173
    depends_on:
      - mongodb
    networks:
      - hackintym2k26-network
    restart: unless-stopped

  mongo-express:
    image: mongo-express:latest
    container_name: hackintym2k26-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMIN_USERNAME: admin
      ME_CONFIG_MONGODB_ADMIN_PASSWORD: password
      ME_CONFIG_MONGODB_URL: mongodb://admin:password@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: password
    depends_on:
      - mongodb
    networks:
      - hackintym2k26-network

volumes:
  mongo_data:

networks:
  hackintym2k26-network:
    driver: bridge
